name: APK Oluşturucu
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Flutter Kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # KRİTİK ADIM: Eksik olan Android/Gradle dosyalarını GitHub içinde oluşturur
      - name: Projeyi Tamamla
        run: |
          flutter create . --overwrite --platforms android

      - name: Paketleri Getir
        run: flutter pub get

      - name: APK Derle
        run: flutter build apk --debug

      - name: APK'yı Sisteme Yükle
        uses: actions/upload-artifact@v4
        with:
          name: uygulama-dosyasi
          path: build/app/outputs/flutter-apk/app-debug.apk
          
