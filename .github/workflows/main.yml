name: APK Oluşturucu
on: [push] # Kodu her güncellediğinde çalışır

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --debug # Debug modunda hızlıca APK yapar
      
      - name: APK'yı Sisteme Yükle
        uses: actions/upload-artifact@v3
        with:
          name: uygulama-dosyasi
          path: build/app/outputs/flutter-apk/app-debug.apk
          
